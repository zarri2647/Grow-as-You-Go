<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webpage Design for Desktop</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0c1524; /* Dark futuristic background matching his outer frame */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Outer Desktop Application Window */
        .desktop-window {
            background-color: #000000;
            width: 100%;
            max-width: 1100px;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border: 1px solid #1e293b;
        }

        /* Top Navigation Header Bar */
        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #2c2c2c; /* Dark gray menu bar */
            padding: 10px 20px;
            border-radius: 25px;
            margin-bottom: 25px;
            height: 60px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-grow: 1;
        }

        /* Profile Picture Circle */
        .pfp-circle {
            width: 42px;
            height: 42px;
            background-color: #ffffff;
            color: #000000;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 13px;
        }

        /* Capsule Shape Level Bar */
        .level-capsule {
            background-color: #444444;
            color: #ffffff;
            padding: 8px 25px;
            border-radius: 20px;
            font-size: 14px;
            width: 100%;
            max-width: 320px;
            letter-spacing: 0.5px;
        }

        /* Hamburger Menu Icon */
        .menu-icon {
            display: flex;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
        }

        .menu-icon span {
            width: 32px;
            height: 4px;
            background-color: #ffffff;
            border-radius: 2px;
        }

        /* 3-Column Content Layout Grid */
        .grid-layout {
            display: grid;
            grid-template-columns: 1.1fr 1.1fr 0.8fr;
            gap: 25px;
        }

        /* Base Card Styling matching his light gray panels */
        .panel-card {
            background-color: #cccccc; 
            border-radius: 35px;
            padding: 25px;
            color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 480px;
        }

        /* COLUMN 1 ELEMENTS (POMODORO) */
        .mode-row {
            display: flex;
            gap: 12px;
            width: 100%;
            margin-bottom: 20px;
        }

        .mode-box {
            flex: 1;
            padding: 15px 5px;
            border: 3px solid #000000;
            font-weight: bold;
            font-size: 15px;
            text-align: center;
            cursor: pointer;
        }
        .box-pomo { background-color: #5bc0be; }   /* Blue-ish Aqua */
        .box-short { background-color: #00c853; }  /* Bright Green */
        .box-long { background-color: #81c784; }   /* Light Green */

        /* Sharp Black-Border Display Inputs */
        .wireframe-display {
            width: 100%;
            background-color: #e0e0e0;
            border: 3px solid #000000;
            padding: 15px;
            text-align: center;
            font-size: 32px;
            margin-bottom: 20px;
        }

        .task-list-display {
            font-size: 18px;
            padding: 12px;
        }

        .control-row {
            display: flex;
            gap: 10px;
            width: 100%;
            margin-top: auto;
        }

        .control-box {
            flex: 1;
            background-color: #e0e0e0;
            border: 3px solid #000000;
            padding: 15px 5px;
            font-size: 16px;
            text-align: center;
            cursor: pointer;
        }

        /* COLUMN 2 ELEMENTS (PLANT PROGRESSION) */
        .plant-label {
            font-size: 26px;
            margin-bottom: 15px;
        }

        .image-frame {
            width: 100%;
            background-color: #ffffff;
            border-radius: 16px;
            padding: 8px;
            border: 1px solid #a3a3a3;
            margin-bottom: 15px;
        }

        .image-frame img {
            width: 100%;
            border-radius: 12px;
            display: block;
        }

        .rarity-text {
            font-size: 16px;
            margin-bottom: 15px;
        }

        .small-preview {
            width: 110px;
            background-color: #ffffff;
            border-radius: 8px;
            padding: 4px;
            border: 1px solid #a3a3a3;
        }

        .small-preview img {
            width: 100%;
            border-radius: 6px;
            display: block;
        }

        /* COLUMN 3 ELEMENTS (LEADERBOARD) */
        .leaderboard-label {
            font-size: 22px;
            margin: auto 0; /* Perfectly centers the text inside the grey block */
            color: #333333;
        }
    </style>
</head>
<body>

    <div class="desktop-window">
        <!-- Exact Top Menu Area -->
        <div class="top-header">
            <div class="header-left">
                <div class="pfp-circle">PFP</div>
                <div class="level-capsule">LEVEL xp1000</div>
            </div>
            <div class="menu-icon">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>

        <!-- Exact 3-Column Visual Layout -->
        <div class="grid-layout">
            
            <!-- Column 1: Pomodoro UI Framework -->
            <div class="panel-card">
                <div class="mode-row">
                    <div class="mode-box box-pomo">pomodoro</div>
                    <div class="mode-box box-short">short</div>
                    <div class="mode-box box-long">long<br>break</div>
                </div>
                
                <div class="wireframe-display">25:00</div>
                
                <div class="wireframe-display task-list-display">task list</div>
                
                <div class="control-row">
                    <div class="control-box">start</div>
                    <div class="control-box">customize</div>
                    <div class="control-box">reset</div>
                </div>
            </div>

            <!-- Column 2: Plant Growth Feed -->
            <div class="panel-card">
                <div class="plant-label">plant growing</div>
                
                <div class="image-frame">
                    <img src="https://www.magnific.com/vectors/small-plant-growing?auto=format&fit=crop&w=400&q=80" alt="Main Sprout">
                </div>
                
                <div class="rarity-text">you got rare plant</div>
                
                <div class="small-preview">
                    <img src="https://www.magnific.com/vectors/small-plant-growing?auto=format&fit=crop&w=400&q=80" alt="Mini Sprout">
                </div>
            </div>

            <!-- Column 3: Leaderboard Panel -->
            <div class="panel-card">
                <div class="leaderboard-label">leaderboard</div>
            </div>

        </div>
    </div>

</body>
</html>
