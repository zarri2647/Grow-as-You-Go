<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <style>
        :root {
            --bg-color: #ba4949;
            --box-color: rgba(255, 255, 255, 0.1);
            --text-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            transition: background-color 0.5s ease;
        }

        .timer-container {
            background-color: var(--box-color);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            text-align: center;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 350px;
        }

        .modes {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }

        .mode-btn {
            background: none;
            border: none;
            color: var(--text-color);
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            padding: 5px 12px;
            border-radius: 5px;
            opacity: 0.75;
            transition: opacity 0.2s;
        }

        .mode-btn:hover, .mode-btn.active {
            opacity: 1;
            background-color: rgba(0, 0, 0, 0.15);
        }

        .time-display {
            font-size: 80px;
            font-weight: bold;
            margin: 20px 0;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .control-btn {
            background-color: #ffffff;
            color: #333333;
            border: none;
            padding: 12px 30px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px 0 #cccccc;
            transition: all 0.1s ease;
        }

        .control-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        #reset-btn {
            background-color: transparent;
            color: var(--text-color);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: none;
            padding: 12px 20px;
        }

        #reset-btn:active {
            transform: none;
            background-color: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <div class="timer-container">
        <div class="modes">
            <button class="mode-btn active" onclick="setMode('pomodoro', 25, '#ba4949')">Pomodoro</button>
            <button class="mode-btn" onclick="setMode('short', 5, '#38858a')">Short Break</button>
            <button class="mode-btn" onclick="setMode('long', 15, '#397097')">Long Break</button>
        </div>
        
        <div class="time-display" id="timer">25:00</div>
        
        <div class="controls">
            <button class="control-btn" id="start-btn" onclick="toggleTimer()">START</button>
            <button class="control-btn" id="reset-btn" onclick="resetTimer()">Reset</button>
        </div>
    </div>
<script src="index.js"></script>    
</body>
</html>
