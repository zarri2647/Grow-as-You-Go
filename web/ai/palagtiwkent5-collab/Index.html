<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grow As You Go</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* This keeps the prank link looking like normal text instead of turning bright blue */
        #message a {
            color: inherit;
            text-decoration: none;
            font-weight: bold;
        }
        #message a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<header>
    <h1>Grow As You Go</h1>
    <p>Learn. Improve. Succeed.</p>
</header>

<section class="content">
    <h2>Welcome!</h2>
    <p id="message">
        Every small step you take today helps you grow tomorrow.
    </p>

    <button onclick="changeMessage()">Grow Now</button>
</section>

<script src="script.js"></script>
</body>
</html>
