<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GYG</title>
    <style>
        :root{
            primary-bg-color: green;
            primary-bg-color: rgb(214, 235, 26);
            primary-bg-color: rgb(247, 154, 33);
            primary-bg-color: rgb(170, 20, 240);
            primary-bg-color: rgb(17, 246, 147);
            primary-bg-color: rgb(20, 231, 235);
        }

        body{
            margin:0px;
            background-color: rgb(0, 0, 0);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        @keyframes animationloading {
            0% {left: 0px; width: 120px;height: 120px;}
            25% {left: 0px; transform: rotate(360deg);}
            45% {left: 0px; width: 150px; height: 150px;}
            100% {left: 0px; width: 120px; height: 120px;}
        }
        .tr{
             display: flex;
            justify-content: center;
            align-items: center;
            min-height: 150vh;
        }
        .c{
            
            display: flex;
            justify-content: center;
            align-items: center;
            width:120px;
            height: 120px;
            position: relative;
            background-color: rgb(122, 106, 106);
            border-radius: 11px;
            animation-duration: 8s;
            animation-name: animationloading;
            animation-iteration-count: infinite;
            color: antiquewhite;
        }
        .d{
            margin: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            width:120px;
            height: 120px;
            position: relative;
            background-color: rgb(0, 0, 0);
            border-radius: 11px;
            animation-duration: 8s;
            animation-name: animationloading;
            animation-iteration-count: infinite;
            color: antiquewhite;
        }
    </style>
</head>
<body>

    <!--animation loading-->
<div class="tr">
    <div class="c">
        <div class="d" style="background-color: antiquewhite;"></div>
        <div class="d" style="background-color: aqua;"></div>
        <div class="d" style="background-color: gray;"></div>
        <div class="d" style="background-color: aquamarine;"></div>
        <div class="d" style="background-color: blue;"></div>
        <div class="d" style="background-color: violet;"></div>
    </div>
  </div>
</div>
</body>
</html>
